<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./estilos.css">
    <title>Calculadora Modular Web</title>
</head>
<body>
    <h1 id="titulo-principal">Calculadora Modular</h1>
    <p>Sistema de cálculos básicos</p>
    <form id="form-calculadora" action="#" method="post">
        Numero 1 <input type="text" name="num1" placeholder="Ingrese un número" id="num1">
        Numero 2 <input type="text" name="num2" placeholder="Ingrese un número" id="num2">
        <div class="operaciones">
            <label for="suma">Suma</label>
            <input type="radio" name="operacion" id="suma">
            <label for="resta">Resta</label>
            <input type="radio" name="operacion" id="resta">
            <label for="multiplicacion">Multiplicación</label>
            <input type="radio" name="operacion" id="multiplicacion">
            <label for="division">División</label>
            <input type="radio" name="operacion" id="division">
        
        </div>

        <input type="button" value="Enviar" id="btnenviar">
    </form>
    
</body>
</html>
